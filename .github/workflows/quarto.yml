name: Build Quarto website

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          quarto-version: latest
      - run: python --version
      - run: quarto render
      - run: ls -R docs
